
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#1877F2">
    <title>Login - Task Flow Granatt</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="https://www.taskflowgranatt.com.br/public/uploads/favicon_sistema.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://www.taskflowgranatt.com.br/public/uploads/favicon_sistema.png">
    <link rel="shortcut icon" href="https://www.taskflowgranatt.com.br/public/uploads/favicon_sistema.png">
    <link rel="apple-touch-icon" href="https://www.taskflowgranatt.com.br/public/uploads/favicon_sistema.png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #a50037;
            --secondary-color: #7d0c27;
            --accent-color: #00c851;
            --dark-bg: #0F0F0F;
            --light-bg: #FFFFFF;
            --gray-50: #FAFAFA;
            --gray-100: #F5F5F5;
            --gray-200: #EEEEEE;
            --gray-300: #E0E0E0;
            --gray-400: #BDBDBD;
            --gray-500: #9E9E9E;
            --gray-600: #757575;
            --gray-700: #616161;
            --gray-800: #424242;
            --gray-900: #212121;
            --border-color: #DBDBDB;
            --text-primary: #262626;
            --text-secondary: #8E8E8E;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--light-bg);
            min-height: 100vh;
            min-height: calc(var(--vh, 1vh) * 100);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text-primary);
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .login-wrapper {
            display: flex;
            min-height: 100vh;
            min-height: calc(var(--vh, 1vh) * 100);
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            max-width: 1000px;
            width: 100%;
            background: var(--light-bg);
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            min-height: 600px;
        }

        /* Seção Visual (lado esquerdo) */
        .visual-section {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 3rem 2rem;
            position: relative;
            overflow: hidden;
        }

        .visual-section::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="2" fill="rgba(255,255,255,0.1)"/><circle cx="80" cy="40" r="1.5" fill="rgba(255,255,255,0.1)"/><circle cx="40" cy="80" r="1" fill="rgba(255,255,255,0.1)"/><circle cx="90" cy="90" r="2.5" fill="rgba(255,255,255,0.1)"/></svg>');
            animation: float 20s linear infinite;
        }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-50px, -50px) rotate(360deg); }
        }

        .visual-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: white;
        }

        .visual-content .logo {
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .visual-content .logo img {
            width: 60px;
            height: 60px;
            border-radius: 12px;
        }

        .visual-content h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }

        .visual-content p {
            font-size: 1.125rem;
            opacity: 0.9;
            font-weight: 400;
        }

        /* Seção do Formulário (lado direito) */
        .form-section {
            padding: 3rem 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .form-header h2 {
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .form-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .login-form {
            width: 100%;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-control {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            background: var(--light-bg);
            transition: all 0.2s ease;
            color: var(--text-primary);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(24, 119, 242, 0.1);
        }

        .form-control::placeholder {
            color: var(--text-secondary);
        }

        .btn-login {
            width: 100%;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.875rem 1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 0.5rem;
        }

        .btn-login:hover {
            background: #166FE5;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(24, 119, 242, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .divider {
            position: relative;
            text-align: center;
            margin: 1.5rem 0;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--border-color);
            z-index: 0;
        }

        .divider-text {
            position: relative;
            z-index: 1;
            display: inline-block;
            background: var(--light-bg);
            padding: 0 1rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
        }

        .btn-microsoft {
            width: 100%;
            background: white;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.875rem 1rem;
            font-size: 0.95rem;
            font-weight: 500;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            transition: all 0.2s ease;
        }

        .btn-microsoft:hover {
            background: var(--gray-50);
            border-color: var(--gray-300);
            color: var(--text-primary);
            text-decoration: none;
        }

        .btn-microsoft i {
            font-size: 1.25rem;
            color: #0078D4;
        }

        .alert {
            border-radius: 8px;
            border: none;
            padding: 0.875rem 1rem;
            margin-bottom: 1.25rem;
            font-size: 0.9rem;
        }

        .alert-danger {
            background: #FEF2F2;
            color: #DC2626;
            border-left: 4px solid #DC2626;
        }

        .alert-danger i {
            margin-right: 0.5rem;
        }

        .form-footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
        }

        .form-footer p {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .form-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        /* Loading state */
        .btn-login.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .btn-login.loading i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Mobile First Design */
        @media (max-width: 768px) {
            .login-wrapper {
                padding: 0;
                min-height: 100vh;
            }

            .login-container {
                grid-template-columns: 1fr;
                max-width: 100%;
                min-height: 100vh;
                min-height: calc(var(--vh, 1vh) * 100);
                border-radius: 0;
                box-shadow: none;
                margin: 0;
            }

            /* Seção visual compacta para mobile */
            .visual-section {
                display: flex;
                padding: 2rem 1.5rem 1.5rem;
                min-height: auto;
                background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            }

            .visual-content {
                width: 100%;
                text-align: center;
            }

            .visual-content .logo {
                width: 80px;
                height: 80px;
                margin: 0 auto 1rem;
                background: rgba(255, 255, 255, 0.2);
                border-radius: 20px;
                display: flex;
                align-items: center;
                justify-content: center;
                backdrop-filter: blur(10px);
                border: 2px solid rgba(255, 255, 255, 0.3);
            }

            .visual-content .logo img {
                width: 50px;
                height: 50px;
                border-radius: 10px;
            }

            .visual-content h1 {
                font-size: 1.5rem;
                font-weight: 600;
                margin-bottom: 0.25rem;
                letter-spacing: -0.025em;
            }

            .visual-content p {
                font-size: 0.9rem;
                opacity: 0.9;
                margin: 0;
            }

            .form-section {
                padding: 2rem 1.5rem 3rem;
                flex: 1;
                display: flex;
                flex-direction: column;
                justify-content: center;
                min-height: 60vh;
            }

            .form-header {
                margin-bottom: 1.5rem;
            }

            .form-header h2 {
                font-size: 1.5rem;
                margin-bottom: 0.25rem;
            }

            .form-header p {
                font-size: 0.9rem;
            }

            .form-group {
                margin-bottom: 1rem;
            }

            .form-control {
                padding: 1rem;
                font-size: 1rem;
                border-radius: 12px;
                border: 2px solid var(--border-color);
                background: var(--light-bg);
            }

            .form-control:focus {
                border-color: var(--primary-color);
                box-shadow: 0 0 0 3px rgba(24, 119, 242, 0.1);
                outline: none;
            }

            .btn-login {
                padding: 1rem;
                font-size: 1rem;
                font-weight: 600;
                border-radius: 12px;
                margin-top: 0.5rem;
                background: var(--primary-color);
                color: white;
                border: none;
                cursor: pointer;
                transition: all 0.2s ease;
            }

            .btn-login:hover {
                background: #166FE5;
                transform: translateY(-1px);
                box-shadow: 0 4px 12px rgba(24, 119, 242, 0.3);
            }

            .btn-microsoft {
                padding: 1rem;
                font-size: 0.95rem;
                border-radius: 12px;
                border: 2px solid var(--border-color);
                background: white;
                color: var(--text-primary);
            }

            .divider {
                margin: 1.5rem 0;
            }

            .form-footer {
                margin-top: 1.5rem;
                padding-top: 1rem;
                border-top: 1px solid var(--border-color);
            }
        }

        /* Telas muito pequenas (iPhone SE, etc.) */
        @media (max-width: 480px) {
            .visual-section {
                padding: 1.5rem 1rem 1rem;
            }

            .visual-content .logo {
                width: 70px;
                height: 70px;
                margin-bottom: 0.75rem;
            }

            .visual-content .logo img {
                width: 45px;
                height: 45px;
            }

            .visual-content h1 {
                font-size: 1.25rem;
            }

            .visual-content p {
                font-size: 0.85rem;
            }

            .form-section {
                padding: 1.5rem 1rem 2rem;
            }

            .form-header h2 {
                font-size: 1.25rem;
            }

            .form-header p {
                font-size: 0.85rem;
            }

            .form-control {
                padding: 0.875rem;
                font-size: 0.95rem;
            }

            .btn-login {
                padding: 0.875rem;
                font-size: 0.95rem;
            }

            .btn-microsoft {
                padding: 0.875rem;
                font-size: 0.9rem;
            }
        }

        /* Landscape mobile */
        @media (max-width: 768px) and (orientation: landscape) {
            .login-container {
                min-height: 100vh;
                min-height: calc(var(--vh, 1vh) * 100);
            }

            .visual-section {
                padding: 1rem 1.5rem;
                min-height: auto;
            }

            .visual-content .logo {
                width: 60px;
                height: 60px;
                margin-bottom: 0.5rem;
            }

            .visual-content .logo img {
                width: 35px;
                height: 35px;
            }

            .visual-content h1 {
                font-size: 1.25rem;
                margin-bottom: 0.25rem;
            }

            .visual-content p {
                font-size: 0.8rem;
            }

            .form-section {
                padding: 1.5rem;
                min-height: auto;
            }

            .form-header {
                margin-bottom: 1rem;
            }

            .form-header h2 {
                font-size: 1.25rem;
            }

            .form-group {
                margin-bottom: 0.75rem;
            }

            .form-control {
                padding: 0.75rem;
            }

            .btn-login {
                padding: 0.75rem;
                margin-top: 0.25rem;
            }
        }

        /* Melhorias para touch devices */
        @media (hover: none) and (pointer: coarse) {
            .btn-login:hover,
            .btn-microsoft:hover {
                transform: none;
                box-shadow: none;
            }

            .btn-login:active {
                background: #166FE5;
                transform: scale(0.98);
            }

            .btn-microsoft:active {
                background: var(--gray-50);
                transform: scale(0.98);
            }

            .form-control:focus {
                border-color: var(--primary-color);
                box-shadow: 0 0 0 3px rgba(24, 119, 242, 0.15);
            }
        }
    </style>
    
    <script>
        // Converter cores hex para RGB para usar com transparências
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }
        
        // Aplicar cores dinâmicas
        document.addEventListener('DOMContentLoaded', function() {
            const primaryColor = '#a50037';
            const secondaryColor = '#7d0c27';
            
            const primaryRgb = hexToRgb(primaryColor);
            const secondaryRgb = hexToRgb(secondaryColor);
            
            if (primaryRgb && secondaryRgb) {
                document.documentElement.style.setProperty('--primary-color-rgb', `${primaryRgb.r}, ${primaryRgb.g}, ${primaryRgb.b}`);
                document.documentElement.style.setProperty('--secondary-color-rgb', `${secondaryRgb.r}, ${secondaryRgb.g}, ${secondaryRgb.b}`);
            }

            // Adicionar loading state ao formulário
            const form = document.querySelector('.login-form');
            const submitBtn = document.querySelector('.btn-login');
            
            if (form && submitBtn) {
                form.addEventListener('submit', function() {
                    submitBtn.classList.add('loading');
                    submitBtn.innerHTML = '<i class="fas fa-spinner"></i> Entrando...';
                });
            }

            // Melhorias para dispositivos móveis
            function isMobile() {
                return window.innerWidth <= 768;
            }

            // Prevenir zoom no input focus em iOS
            if (isMobile()) {
                const inputs = document.querySelectorAll('.form-control');
                inputs.forEach(input => {
                    input.addEventListener('focus', function() {
                        // Prevenir zoom no iOS
                        const viewport = document.querySelector('meta[name="viewport"]');
                        if (viewport) {
                            viewport.setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no');
                        }
                    });

                    input.addEventListener('blur', function() {
                        // Restaurar zoom após sair do input
                        setTimeout(() => {
                            const viewport = document.querySelector('meta[name="viewport"]');
                            if (viewport) {
                                viewport.setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no');
                            }
                        }, 300);
                    });
                });
            }

            // Melhorar experiência de touch
            if ('ontouchstart' in window) {
                document.body.classList.add('touch-device');
            }

            // Prevenir scroll horizontal
            document.body.style.overflowX = 'hidden';

            // Ajustar altura da viewport em mobile
            function setViewportHeight() {
                if (isMobile()) {
                    const vh = window.innerHeight * 0.01;
                    document.documentElement.style.setProperty('--vh', `${vh}px`);
                }
            }

            setViewportHeight();
            window.addEventListener('resize', setViewportHeight);
            window.addEventListener('orientationchange', setViewportHeight);
        });
    </script>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-container">
            <!-- Seção Visual (lado esquerdo) -->
            <div class="visual-section">
                <div class="visual-content">
                    <div class="logo">
                        <img src="https://www.taskflowgranatt.com.br/public/uploads/favicon_sistema.png" alt="Logo do Sistema">
                    </div>
                    <h1>Task Flow Granatt</h1>
                    <p>Relatório de atividades</p>
                </div>
            </div>

            <!-- Seção do Formulário (lado direito) -->
            <div class="form-section">
                <div class="form-header">
                    <h2>Entrar</h2>
                    <p>Faça login para acessar sua conta</p>
                </div>

                
                <form method="POST" class="login-form">
                    <div class="form-group">
                        <input type="email" class="form-control" id="email" name="email" placeholder="Email ou telefone" required>
                    </div>
                    
                    <div class="form-group">
                        <input type="password" class="form-control" id="senha" name="senha" placeholder="Senha" required>
                    </div>
                    
                    <button type="submit" class="btn-login">
                        Entrar
                    </button>
                </form>
                
                                
                                    <div class="divider">
                        <span class="divider-text">ou</span>
                    </div>
                    
                    <a href="https://www.taskflowgranatt.com.br/microsoft/login" class="btn-microsoft">
                        <i class="fab fa-microsoft"></i>
                        Entrar com Microsoft
                    </a>
                
                <div class="form-footer">
                    <p>Esqueceu sua senha?</p>
                    <a href="#">Recuperar senha</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
