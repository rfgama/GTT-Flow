    <script>
    // Sistema inteligente para carregamento do CSS personalizado
    (function() {
        let cssRecarregado = false;
        let ultimaModificacao = null;
        
        // Função para recarregar o CSS personalizado
        function recarregarCSSPersonalizado() {
            const cssLink = document.getElementById('css-personalizado');
            if (cssLink && !cssRecarregado) {
                const timestamp = new Date().getTime();
                cssLink.href = cssLink.href.split('?')[0] + '?v=' + timestamp;
                cssRecarregado = true;
                
                // Marcar que foi recarregado
                sessionStorage.setItem('cssRecarregado', 'true');
                sessionStorage.setItem('cssTimestamp', timestamp.toString());
            }
        }
        
        // Verificar se o CSS já foi recarregado nesta sessão
        function verificarStatusCSS() {
            const recarregado = sessionStorage.getItem('cssRecarregado');
            const timestamp = sessionStorage.getItem('cssTimestamp');
            
            if (recarregado === 'true' && timestamp) {
                cssRecarregado = true;
                ultimaModificacao = parseInt(timestamp);
            }
        }
        
        // Recarregar CSS apenas uma vez após o carregamento da página
        document.addEventListener('DOMContentLoaded', function() {
            verificarStatusCSS();
            
            if (!cssRecarregado) {
                // Aguardar um pouco para garantir que tudo esteja carregado
                setTimeout(function() {
                    recarregarCSSPersonalizado();
                }, 1000);
            }
        });
        
        // Recarregar CSS apenas quando o usuário voltar para a página (visibilitychange)
        // e apenas se não foi recarregado recentemente
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden && !cssRecarregado) {
                // Página se tornou visível novamente e CSS ainda não foi recarregado
                setTimeout(function() {
                    recarregarCSSPersonalizado();
                }, 500);
            }
        });
        
        // Função para forçar recarregamento do CSS (pode ser chamada manualmente se necessário)
        window.recarregarCSS = function() {
            cssRecarregado = false;
            sessionStorage.removeItem('cssRecarregado');
            sessionStorage.removeItem('cssTimestamp');
            recarregarCSSPersonalizado();
        };
        
        // Função para verificar se há atualizações no CSS (pode ser chamada periodicamente se necessário)
        window.verificarAtualizacoesCSS = function() {
            // Esta função pode ser implementada para verificar se o arquivo CSS foi modificado
            // Por enquanto, não faz nada para evitar reloads desnecessários
        };
    })();
    </script>

    <script>
        // Sidebar Toggle Functionality
        document.addEventListener('DOMContentLoaded', function() {
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('mainContent');
            const sidebarToggle = document.getElementById('sidebarToggle');
            const mobileMenuToggle = document.getElementById('mobileMenuToggle');
            const sidebarOverlay = document.getElementById('sidebarOverlay');
            const toggleIcon = sidebarToggle.querySelector('i');
            
            // Clear localStorage to start fresh
            localStorage.removeItem('sidebarCollapsed');
            
            // Check if sidebar state is saved in localStorage
            const sidebarCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
            
            if (sidebarCollapsed) {
                sidebar.classList.add('collapsed');
                mainContent.classList.add('expanded');
                sidebarToggle.classList.add('collapsed');
                toggleIcon.classList.remove('fa-bars');
                toggleIcon.classList.add('fa-chevron-right');
            } else {
                toggleIcon.classList.remove('fa-chevron-right');
                toggleIcon.classList.add('fa-bars');
            }
            
            // Toggle do menu desktop
            sidebarToggle.addEventListener('click', function() {
                sidebar.classList.toggle('collapsed');
                mainContent.classList.toggle('expanded');
                sidebarToggle.classList.toggle('collapsed');
                
                // Toggle icon
                if (sidebar.classList.contains('collapsed')) {
                    toggleIcon.classList.remove('fa-bars');
                    toggleIcon.classList.add('fa-chevron-right');
                    localStorage.setItem('sidebarCollapsed', 'true');
                } else {
                    toggleIcon.classList.remove('fa-chevron-right');
                    toggleIcon.classList.add('fa-bars');
                    localStorage.setItem('sidebarCollapsed', 'false');
                }
            });
            
            // Toggle do menu mobile
            if (mobileMenuToggle) {
                mobileMenuToggle.addEventListener('click', function() {
                    sidebar.classList.toggle('show');
                    sidebarOverlay.classList.toggle('show');
                    document.body.style.overflow = sidebar.classList.contains('show') ? 'hidden' : '';
                });
            }
            
            // Fechar menu mobile ao clicar no overlay
            if (sidebarOverlay) {
                sidebarOverlay.addEventListener('click', function() {
                    sidebar.classList.remove('show');
                    sidebarOverlay.classList.remove('show');
                    document.body.style.overflow = '';
                });
            }
            
            // Fechar menu mobile ao redimensionar para desktop
            function handleResize() {
                if (window.innerWidth <= 768) {
                    // Em mobile, sempre começar com menu fechado
                    sidebar.classList.remove('show');
                    sidebarOverlay.classList.remove('show');
                    document.body.style.overflow = '';
                    
                    // Manter comportamento desktop
                    if (!sidebarCollapsed) {
                        sidebar.classList.remove('collapsed');
                        mainContent.classList.remove('expanded');
                        sidebarToggle.classList.remove('collapsed');
                    }
                } else {
                    // Em desktop, restaurar estado salvo
                    if (sidebarCollapsed) {
                        sidebar.classList.add('collapsed');
                        mainContent.classList.add('expanded');
                        sidebarToggle.classList.add('collapsed');
                    }
                }
            }
            
            // Initial check
            handleResize();
            
            // Listen for window resize
            window.addEventListener('resize', handleResize);
            
            // Add active class to current page
            const currentPath = window.location.pathname;
            const navLinks = document.querySelectorAll('.nav-link');
            
            navLinks.forEach(link => {
                if (link.getAttribute('href') && currentPath.includes(link.getAttribute('href').split('/').pop())) {
                    link.classList.add('active');
                }
            });
        });
    </script>
